# ============================================================================
# 金融研报智能体 API - Service（API 服务暴露）
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: agent-api-service
  namespace: agent-platform
  labels:
    app: agent-api
    app.kubernetes.io/name: financial-agent-api
    app.kubernetes.io/part-of: agent-platform
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: agent-api
  ports:
    - name: http
      port: 8001
      targetPort: http
      protocol: TCP