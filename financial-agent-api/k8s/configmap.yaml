# ============================================================================
# 金融研报智能体 API - ConfigMap（非敏感环境变量）
# ============================================================================
# 注意：敏感信息（API Keys）请使用 secret.yaml，不要放在此处
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-platform-config
  namespace: agent-platform
  labels:
    app.kubernetes.io/name: financial-agent-api
    app.kubernetes.io/part-of: agent-platform
    app.kubernetes.io/component: config
data:
  # ---- Provider 配置 ----
  PROVIDER: "nim"

  # ---- NVIDIA NIM 配置 ----
  NIM_BASE_URL: "http://nim-service:8000/v1"
  NIM_MODEL_NAME: "deepseek-ai/deepseek-v4-flash"
  NIM_EMBEDDING_MODEL: "nvidia/nv-embedqa-e5-v5"

  # ---- 向量数据库配置 ----
  CHROMA_DB_DIR: "/app/chroma_db"
  KNOWLEDGE_DIR: "/app/data/knowledge_base"

  # ---- 限流配置 ----
  RATE_LIMIT_RPM: "15"

  # ---- 日志配置 ----
  LOG_LEVEL: "INFO"

  # ---- 安全守卫开关 ----
  ENABLE_PII_GUARD: "true"
  ENABLE_PROMPT_GUARD: "true"
  ENABLE_RATE_LIMIT: "true"

  # ---- LLM 缓存配置 ----
  LLM_CACHE_TYPE: "memory"