# ============================================================================
# 金融研报智能体 API - Deployment（API 服务部署）
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-api
  namespace: agent-platform
  labels:
    app: agent-api
    app.kubernetes.io/name: financial-agent-api
    app.kubernetes.io/part-of: agent-platform
    app.kubernetes.io/component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8001"
    prometheus.io/path: "/metrics"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-api
  template:
    metadata:
      labels:
        app: agent-api
        app.kubernetes.io/name: financial-agent-api
        app.kubernetes.io/part-of: agent-platform
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: agent-api
          image: agent-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agent-platform-config
            - secretRef:
                name: agent-platform-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: knowledge-data
              mountPath: /app/data/knowledge_base
      volumes:
        - name: knowledge-data
          persistentVolumeClaim:
            claimName: knowledge-data-pvc
---
# ============================================================================
# PVC - 知识库数据持久化
# ============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: knowledge-data-pvc
  namespace: agent-platform
  labels:
    app: agent-api
    app.kubernetes.io/name: financial-agent-api
    app.kubernetes.io/part-of: agent-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi