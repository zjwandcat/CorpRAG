# ============================================================================
# 金融研报智能体 API - Secret 示例（供开发者参考）
# ============================================================================
# 使用方法：
#   1. 复制此文件为 secret.yaml
#   2. 将空字符串替换为真实 API Key 的 base64 编码
#   3. 生成方式：echo -n 'your-api-key' | base64
#
# 注意：secret.yaml 已加入 .gitignore，不会被提交到 Git
apiVersion: v1
kind: Secret
metadata:
  name: agent-platform-secrets
  namespace: agent-platform
  labels:
    app.kubernetes.io/name: financial-agent-api
    app.kubernetes.io/part-of: agent-platform
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # NVIDIA NGC API Key - 用于 NIM 大模型推理服务
  NVIDIA_API_KEY: ""
  # 讯飞星火 API Key - 用于讯飞大模型服务
  XFYUN_API_KEY: ""
  # 智谱 AI API Key - 用于智谱大模型服务
  ZHIPU_API_KEY: ""
  # Blueprint API Key - 用于 Blueprint 服务集成
  BLUEPRINT_API_KEY: ""