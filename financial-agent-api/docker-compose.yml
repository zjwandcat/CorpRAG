# ============================================================================
# 金融研报智能体 API - Docker Compose 多容器编排配置
# ============================================================================
#
# 端口分配说明（宿主机端口映射）：
# ┌──────────┬──────────┬──────────────────────────┐
# │ 宿主机端口 │ 容器端口  │ 服务                      │
# ├──────────┼──────────┼──────────────────────────┤
# │ 8001     │ 8001     │ FastAPI 应用 (api)        │
# │ 8002     │ 8000     │ NVIDIA NIM 大模型 (nim)   │
# │ 8003     │ 8000     │ ChromaDB 向量数据库       │
# └──────────┴──────────┴──────────────────────────┘
#
# 提示：如果用户本机已运行 NIM 服务，可以注释掉 nim 服务定义，
#       并将 api 服务的 NIM_BASE_URL 环境变量改为：
#       http://host.docker.internal:8000/v1
# ============================================================================

services:
  # ==========================================================================
  # 服务 1：api - FastAPI 应用（金融研报智能体后端）
  # ==========================================================================
  api:
    build: .                              # 使用当前目录的 Dockerfile 构建镜像
    container_name: financial-agent-api   # 容器名称，方便日志查看和管理
    ports:
      - "8001:8001"                       # 宿主机 8001 -> 容器 8001（API 服务端口）
    volumes:
      - ./data:/app/data                  # 研报文件持久化（PDF/TXT 源文件）
      - ./chroma_db:/app/chroma_db        # 向量数据库持久化（ChromaDB 存储目录）
    environment:
      # NIM 服务地址：通过 Docker 服务名 nim 访问容器内部 8000 端口
      NIM_BASE_URL: http://nim:8000/v1
      # 大语言模型名称（NIM 容器中加载的模型）
      NIM_MODEL_NAME: moonshotai/kimi-k2.6
      # Embedding 模型名称（NIM 容器中加载的嵌入模型）
      NIM_EMBEDDING_MODEL: nvidia/nv-embedqa-e5-v5
      # NVIDIA API Key（本地 NIM 不需要真实 Key，但 LangChain 需要非空值）
      NVIDIA_API_KEY: not-needed-for-local-nim
      # 限速配置：每分钟允许的最大请求数
      RATE_LIMIT_RPM: "15"
    depends_on:
      nim:                                # 依赖 NIM 服务先启动
        condition: service_healthy        # 且 NIM 健康检查通过后才启动
      chromadb:                           # 依赖 ChromaDB 服务先启动
        condition: service_healthy        # 且 ChromaDB 健康检查通过后才启动
    restart: unless-stopped               # 非手动停止时自动重启（崩溃/重启机器）
    networks:
      - agent-network                     # 加入自定义桥接网络
    healthcheck:                          # 容器健康检查配置
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]  # 健康检查命令
      interval: 30s                       # 检查间隔：每 30 秒检查一次
      timeout: 10s                        # 超时时间：单次检查超过 10 秒视为失败
      retries: 3                          # 重试次数：连续 3 次失败才标记为 unhealthy
      start_period: 30s                   # 启动等待：容器启动后 30 秒才开始健康检查

  # ==========================================================================
  # 服务 2：nim - NVIDIA NIM 大模型推理服务
  # ==========================================================================
  nim:
    image: nvcr.io/nim/moonshotai/kimi-k2.6:latest  # NIM 官方镜像
    container_name: nim-service           # 容器名称
    ports:
      - "8002:8000"                       # 宿主机 8002 -> 容器 8000（避免与 api 的 8001 冲突）
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia              # GPU 驱动：NVIDIA
              count: all                  # 使用所有可用 GPU
              capabilities: [gpu]         # 设备能力：GPU 计算
    ipc: host                             # 共享主机 IPC 命名空间（多 GPU 通信需要）
    shm_size: 32gb                        # 共享内存大小（大模型推理需要大量共享内存）
    environment:
      # NGC API Key：用于拉取 NIM 镜像和模型权重，从 .env 文件读取
      NGC_API_KEY: ${NGC_API_KEY}
    volumes:
      - nim-cache:/opt/nim/.cache         # NIM 模型缓存持久化（避免每次重启重新下载）
    restart: unless-stopped               # 非手动停止时自动重启
    networks:
      - agent-network                     # 加入自定义桥接网络
    healthcheck:                          # NIM 健康检查
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]  # 检查模型列表接口
      interval: 30s                       # 检查间隔
      timeout: 10s                        # 超时时间
      retries: 5                          # 重试次数（NIM 启动较慢，多给几次机会）
      start_period: 60s                   # 启动等待（模型加载需要时间，给 60 秒）

  # ==========================================================================
  # 服务 3：chromadb - 独立向量数据库服务
  # ==========================================================================
  chromadb:
    image: chromadb/chroma:latest         # ChromaDB 官方镜像
    container_name: chromadb-service      # 容器名称
    ports:
      - "8003:8000"                       # 宿主机 8003 -> 容器 8000
    environment:
      IS_PERSISTENT: "TRUE"               # 启用持久化存储（数据不丢失）
      PERSIST_DIRECTORY: /chroma/chroma   # 持久化数据目录
      ANONYMIZED_TELEMETRY: "FALSE"       # 禁用匿名遥测（隐私保护）
    volumes:
      - chromadb-data:/chroma/chroma      # 向量数据持久化（Docker 命名卷）
    restart: unless-stopped               # 非手动停止时自动重启
    networks:
      - agent-network                     # 加入自定义桥接网络
    healthcheck:                          # ChromaDB 健康检查
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]  # 心跳接口
      interval: 10s                       # 检查间隔（ChromaDB 启动快，间隔短一些）
      timeout: 5s                         # 超时时间
      retries: 3                          # 重试次数

# ============================================================================
# 顶层配置：数据卷定义
# ============================================================================
volumes:
  nim-cache:                              # NIM 模型缓存卷（命名卷，Docker 自动管理）
  chromadb-data:                          # ChromaDB 数据卷（命名卷，Docker 自动管理）

# ============================================================================
# 顶层配置：网络定义
# ============================================================================
networks:
  agent-network:                          # 自定义桥接网络
    driver: bridge                        # 网络驱动：bridge（容器间通过服务名互通）